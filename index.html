<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У мене є до тебе питання... ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(251, 111, 146, 0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
            min-height: 380px;
            position: relative;
        }

        h1 {
            color: #fb6f92;
            font-size: 24pt;
            margin-bottom: 15px;
        }

        p {
            color: #6c757d;
            font-size: 12pt;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .gif-container {
            font-size: 50pt;
            margin-bottom: 20px;
        }

        /* Контейнер-таблиця для строгого розташування в один ряд */
        .btn-wrapper {
            display: table;
            margin: 0 auto;
            width: 100%;
            max-width: 300px;
            height: 60px;
            position: relative;
        }

        .btn-cell {
            display: table-cell;
            width: 50%;
            vertical-align: middle;
            text-align: center;
            position: relative;
        }

        button {
            padding: 12px 35px;
            font-size: 13pt;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            display: inline-block;
        }

        .btn-yes {
            background-color: #fb6f92;
            color: white;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.4);
        }

        .btn-yes:hover {
            background-color: #ff8fab;
            transform: scale(1.05);
        }

        /* Абсолютне позиціонування тільки для кнопки Ні всередині її клітинки */
        .btn-no {
            background-color: #e9ecef;
            color: #6c757d;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: none;
        }

        .hidden {
            display: none !important;
        }

        .step-title {
            color: #ff8fab;
            font-size: 16pt;
            margin-bottom: 20px;
            font-weight: bold;
        }

        input[type="datetime-local"] {
            padding: 12px 20px;
            border: 2px solid #ffc2d1;
            border-radius: 12px;
            font-size: 12pt;
            color: #495057;
            outline: none;
            width: 100%;
            margin-bottom: 25px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .option-card {
            background: #fff0f3;
            border: 2px solid #ffe5ec;
            padding: 12px 5px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            color: #ff758f;
            font-size: 11pt;
        }

        .option-card.selected {
            background: #fb6f92;
            color: white;
            border-color: #fb6f92;
        }
    </style>
</head>
<body>

    <!-- КРОК 1 -->
    <div class="card" id="step-1">
        <div class="gif-container">❤️</div>
        <h1>Підеш зі мною на побачення? ✨</h1>
        <p>Обіцяю, буде круто!</p>
        <div class="btn-wrapper">
            <div class="btn-cell">
                <button class="btn-yes" id="yes-btn">ТАК!</button>
            </div>
            <div class="btn-cell" id="no-cell">
                <button class="btn-no" id="no-btn">Ні</button>
            </div>
        </div>
    </div>

    <!-- КРОК 2 -->
    <div class="card hidden" id="step-2">
        <div class="gif-container">📅</div>
        <div class="step-title">Обери дату та час:</div>
        <input type="datetime-local" id="date-input">
        <button class="btn-yes" id="next-to-options" style="width: 100%;">Далі ✨</button>
    </div>

    <!-- КРОК 3 -->
    <div class="card hidden" id="step-3">
        <div class="gif-container">🍕</div>
        <div class="step-title">Куди завітаємо?</div>
        <div class="options-grid">
            <div class="option-card" data-value="Тайська кухня">🍜 Тайська кухня</div>
            <div class="option-card" data-value="Аквапарк">🌊 Аквапарк</div>
            <div class="option-card" data-value="Грузинська кухня">🍷 Грузинська кухня</div>
            <div class="option-card" data-value="Піца">🍕 Піца</div>
            <div class="option-card" data-value="McDonalds">🍔 Мак</div>
            <div class="option-card" data-value="Більярд">🎱 Більярд</div>
        </div>
        <button class="btn-yes" id="next-to-final" style="width: 100%;">Надіслати відповідь 🚀</button>
    </div>

    <!-- КРОК 4 -->
    <div class="card hidden" id="step-4">
        <div class="gif-container">🎉</div>
        <h1>Всі дані збережено!</h1>
        <p id="final-status">Повідомлення вже відправлено мені в Telegram. Готуйся до зустрічі! 😉</p>
    </div>

    <script>
        // --- КОНФІГУРАЦІЯ ТЕЛЕГРАМУ ---
        const TG_TOKEN = "ЗАМІНИ_НА_СВІЙ_ТОКЕН";
        const TG_CHAT_ID = "ЗАМІНИ_НА_СВІЙ_CHAT_ID";

        const noBtn = document.getElementById('no-btn');
        const noCell = document.getElementById('no-cell');
        const yesBtn = document.getElementById('yes-btn');
        const dateInput = document.getElementById('date-input');
        
        let selectedOptions = [];
        let chosenDate = '';

        // Втікання кнопки "Ні" strictly всередині картки
        function moveButton() {
            const card = document.querySelector('.card');
            const cardRect = card.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();
            const cellRect = noCell.getBoundingClientRect();

            // Рахуємо зміщення відносно батьківської клітинки
            const maxX = cardRect.width - btnRect.width - 40;
            const maxY = cardRect.height - btnRect.height - 40;

            const randomX = Math.floor(Math.random() * maxX) - (cardRect.width / 2) + 50;
            const randomY = Math.floor(Math.random() * maxY) - (cardRect.height / 2) + 100;

            noBtn.style.position = 'fixed';
            noBtn.style.left = (cardRect.left + (cardRect.width / 2) + randomX) + 'px';
            noBtn.style.top = (cardRect.top + (cardRect.height / 2) + randomY) + 'px';
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(); });

        yesBtn.addEventListener('click', () => {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        });

        document.getElementById('next-to-options').addEventListener('click', () => {
            if (!dateInput.value) { alert('Обери час!'); return; }
            chosenDate = new Date(dateInput.value).toLocaleString('uk-UA');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
        });

        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('selected');
                const val = card.getAttribute('data-value');
                if (card.classList.contains('selected')) { selectedOptions.push(val); }
                else { selectedOptions = selectedOptions.filter(i => i !== val); }
            });
        });

        document.getElementById('next-to-final').addEventListener('click', () => {
            if (selectedOptions.length === 0) { alert('Обери плани!'); return; }
            
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('step-4').classList.remove('hidden');
            document.getElementById('final-status').innerText = "Відправка даних...";

            // Відправка в Telegram
            const text = `✨ Нова відповідь!\n📅 Дата: ${chosenDate}\n🎯 Плани: ${selectedOptions.join(', ')}`;
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(text)}`;

            fetch(url)
                .then(res => {
                    document.getElementById('final-status').innerText = "Повідомлення надіслано мені в Telegram! Готуйся до зустрічі! 😉";
                })
                .catch(err => {
                    document.getElementById('final-status').innerText = "Сталася помилка відправки, але плани зафіксовано!";
                });
        });
    </script>
</body>
</html>
