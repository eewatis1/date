<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>У мене є до тебе питання... ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            /* ЗАБОРОНЯЄМО будь-який скролл вбік чи вниз для всього екрану */
            overflow: hidden; 
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(251, 111, 146, 0.15);
            text-align: center;
            max-width: 340px; /* Ідеальний розмір під будь-який iPhone/Android */
            width: 100%;
            min-height: 380px;
            /* Картка стає опорною точкою для кнопки "Ні" */
            position: relative; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .content-block {
            width: 100%;
        }

        h1 {
            color: #fb6f92;
            font-size: 20pt;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        p {
            color: #6c757d;
            font-size: 11pt;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .gif-container {
            font-size: 45pt;
            margin-bottom: 10px;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.1); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* Контейнер кнопок */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            height: 50px;
            margin-top: auto;
        }

        .btn-box {
            flex: 1;
            height: 50px;
            position: relative;
        }

        button, .action-btn {
            padding: 12px 20px;
            font-size: 12pt;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            height: 50px;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }

        .btn-yes, .action-btn {
            background-color: #fb6f92;
            color: white;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.3);
        }

        /* Кнопка "Ні" за дефолтом сидить у своїй коробці */
        .btn-no {
            background-color: #e9ecef;
            color: #6c757d;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 999;
            transition: none; /* Миттєве переміщення без затримок */
        }

        .hidden {
            display: none !important;
        }

        .step-title {
            color: #ff8fab;
            font-size: 14pt;
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* Гарний та зрозумілий інпут вибору дати */
        .date-picker-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
        }

        input[type="datetime-local"] {
            padding: 14px 15px;
            border: 2px solid #ffc2d1;
            border-radius: 14px;
            font-size: 12pt;
            color: #495057;
            outline: none;
            width: 100%;
            background: #fffafb;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            -webkit-appearance: none; /* Фікс відображення для iOS Safari */
        }

        input[type="datetime-local"]:focus {
            border-color: #fb6f92;
        }

        /* Сітка вибору розваг */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        .option-card {
            background: #fff0f3;
            border: 2px solid #ffe5ec;
            padding: 12px 5px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            color: #ff758f;
            font-size: 10.5pt;
            user-select: none;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
        }

        /* Свій варіант займає весь рядок по ширині */
        .option-card#custom-option-toggle {
            grid-column: span 2;
        }

        .option-card.selected {
            background: #fb6f92;
            color: white;
            border-color: #fb6f92;
        }

        input[type="text"] {
            padding: 12px 15px;
            border: 2px solid #ffc2d1;
            border-radius: 12px;
            font-size: 11pt;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="card" id="step-1">
        <div class="content-block">
            <div class="gif-container">❤️</div>
            <h1>Підеш зі мною на побачення? ✨</h1>
            <p>Обіцяю, буде круто!</p>
        </div>
        <div class="btn-container">
            <div class="btn-box">
                <button class="btn-yes" id="yes-btn">ТАК!</button>
            </div>
            <div class="btn-box">
                <button class="btn-no" id="no-btn">Ні</button>
            </div>
        </div>
    </div>

    <div class="card hidden" id="step-2">
        <div class="content-block">
            <div class="gif-container">📅</div>
            <div class="step-title">Натисни нижче, щоб обрати дату та час:</div>
            <div class="date-picker-wrapper">
                <input type="datetime-local" id="date-input">
            </div>
        </div>
        <button class="action-btn" id="next-to-options">Далі ✨</button>
    </div>

    <div class="card hidden" id="step-3">
        <div class="content-block">
            <div class="gif-container">🍕</div>
            <div class="step-title">Куди завітаємо?</div>
            <div class="options-grid">
                <div class="option-card" data-value="Тайська кухня">🍜 Тайська</div>
                <div class="option-card" data-value="Аквапарк">🌊 Аквапарк</div>
                <div class="option-card" data-value="Грузинська кухня">🍷 Грузинська</div>
                <div class="option-card" data-value="Піца">🍕 Піца</div>
                <div class="option-card" data-value="McDonalds">🍔 Мак</div>
                <div class="option-card" data-value="Більярд">🎱 Більярд</div>
                <div class="option-card" id="custom-option-toggle" data-value="Свій варіант">✍️ Свій варіант...</div>
            </div>
            <input type="text" id="custom-option-input" class="hidden" placeholder="Впиши сюди свій варіант...">
        </div>
        <button class="action-btn" id="next-to-final">Надіслати відповідь 🚀</button>
    </div>

    <div class="card hidden" id="step-4">
        <div class="gif-container">🎉</div>
        <h1>Всі дані збережено!</h1>
        <p id="final-status" style="margin-bottom: 0; padding-top: 10px;">Відправка даних...</p>
    </div>

    <script>
        const TG_TOKEN = "8381600774:AAHHCZEFH1b7buLl37ISMqYglFM5hIJC-2E";
        const TG_CHAT_ID = "965300336";

        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const dateInput = document.getElementById('date-input');
        const customToggle = document.getElementById('custom-option-toggle');
        const customInput = document.getElementById('custom-option-input');
        
        let selectedOptions = [];
        let chosenDate = '';

        // Задаємо поточну дату як мінімальну для вибору
        const today = new Date();
        today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
        dateInput.min = today.toISOString().slice(0, 16);

        // Математично точне втікання кнопки строго ВСЕРЕДИНІ білої картки
        function moveButton() {
            const card = document.querySelector('.card');
            const cardRect = card.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();

            // Дозволені межі всередині картки з урахуванням внутрішніх відступів
            const padding = 20;
            const maxX = cardRect.width - btnRect.width - (padding * 2);
            const maxY = cardRect.height - btnRect.height - (padding * 2);

            // Генеруємо нові випадкові координати X та Y
            const randomX = Math.floor(Math.random() * maxX) + padding;
            const randomY = Math.floor(Math.random() * maxY) + padding;

            // Прив'язуємо кнопку абсолютно до картки .card
            noBtn.style.position = 'absolute';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => { 
            e.preventDefault(); // Скасовує стандартний клік на мобілці, змушуючи кнопку відразу втікати
            moveButton(); 
        });

        yesBtn.addEventListener('click', () => {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        });

        document.getElementById('next-to-options').addEventListener('click', () => {
            if (!dateInput.value) { alert('Будь ласка, обери час!'); return; }
            chosenDate = new Date(dateInput.value).toLocaleString('uk-UA', { day: 'numeric', month: 'long', hour: '2-digit', minute: '2-digit' });
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
        });

        document.querySelectorAll('.options-grid .option-card').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('selected');
                const val = card.getAttribute('data-value');
                if (card.classList.contains('selected')) { selectedOptions.push(val); }
                else { selectedOptions = selectedOptions.filter(i => i !== val); }
            });
        });

        customToggle.addEventListener('click', () => {
            if (customToggle.classList.contains('selected')) {
                customInput.classList.remove('hidden');
                customInput.focus();
            } else {
                customInput.classList.add('hidden');
                customInput.value = '';
            }
        });

        document.getElementById('next-to-final').addEventListener('click', () => {
            if (customToggle.classList.contains('selected') && customInput.value.trim() !== '') {
                selectedOptions = selectedOptions.filter(i => i !== "Свій варіант");
                selectedOptions.push(`Власний варіант: "${customInput.value.trim()}"`);
            }
            if (selectedOptions.length === 0) { alert('Обери плани або напиши свій варіант!'); return; }
            
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('step-4').classList.remove('hidden');

            const text = `✨ Нова відповідь!\\n📅 Дата: ${chosenDate}\\n🎯 Плани: ${selectedOptions.join(', ')}`;
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(text)}`;

            fetch(url).then(res => {
                document.getElementById('final-status').innerText = "Повідомлення надіслано в Telegram! Готуйся до зустрічі! 😉";
            });
        });
    </script>
</body>
</html>
