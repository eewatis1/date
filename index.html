<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>У мене є до тебе питання... ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Прибирає синій спалах при тапі на айфонах */
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px; /* Мінімальні відступи від країв екрана телефону */
            overflow-x: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px 20px; /* Вертикальні та горизонтальні відступи всередині картки */
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(251, 111, 146, 0.15);
            text-align: center;
            max-width: 400px; /* Максимальна ширина картки, щоб не була надто широкою на великих екранах */
            width: 100%;
            min-height: 350px;
            position: relative;
            transition: all 0.3s ease-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            color: #fb6f92;
            font-size: 20pt; /* Трохи менший шрифт для заголовків на телефоні */
            margin-bottom: 10px;
            line-height: 1.2;
        }

        p {
            color: #6c757d;
            font-size: 11pt; /* Шрифт тексту для читабельності */
            line-height: 1.5;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        .gif-container {
            font-size: 45pt;
            margin-bottom: 15px;
            animation: heartbeat 1.5s infinite; /* Ефект серцебиття */
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* Адаптивний контейнер для кнопок: ТАК і НІ в один ряд */
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* Відступ між кнопками */
            margin-top: 15px;
            width: 100%;
            position: relative;
            min-height: 60px; /* Висота контейнера, щоб було місце для втікання */
        }

        .btn-box {
            flex: 1; /* Кнопки ділять ширину навпіл */
            max-width: 140px; /* Максимальна ширина кожної кнопки */
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        button {
            padding: 12px 20px; /* Вертикальні та горизонтальні відступи в кнопках */
            font-size: 12pt;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
            width: 100%;
            text-align: center;
            white-space: nowrap; /* Текст в один рядок */
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.96); /* Ефект натискання */
        }

        .btn-yes {
            background-color: #fb6f92;
            color: white;
            box-shadow: 0 4px 15px rgba(251, 111, 146, 0.3);
        }

        .btn-yes:hover {
            background-color: #ff8fab;
        }

        .btn-no {
            background-color: #e9ecef;
            color: #6c757d;
            position: absolute;
            z-index: 999;
            transition: none; /* Щоб втікання було миттєвим */
        }

        .hidden {
            display: none !important;
        }

        .step-title {
            color: #ff8fab;
            font-size: 14pt;
            margin-bottom: 15px;
            font-weight: bold;
            line-height: 1.3;
        }

        input[type="datetime-local"], input[type="text"] {
            padding: 12px 15px;
            border: 2px solid #ffc2d1;
            border-radius: 14px;
            font-size: 11pt;
            color: #495057;
            outline: none;
            width: 100%;
            margin-bottom: 20px;
            -webkit-appearance: none; /* Прибирає дефолтні стилі iOS */
        }

        input[type="text"]:focus, input[type="datetime-local"]:focus {
            border-color: #fb6f92;
            background-color: #fffafb;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 колонки на телефоні */
            gap: 10px; /* Менші відступи на телефоні */
            margin-bottom: 20px;
            width: 100%;
        }

        .option-card {
            background: #fff0f3;
            border: 2px solid #ffe5ec;
            padding: 12px 8px; /* Відступи всередині карток вибору */
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            color: #ff758f;
            font-size: 10.5pt; /* Трохи менший шрифт */
            user-select: none;
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
        }

        .option-card.selected {
            background: #fb6f92;
            color: white;
            border-color: #fb6f92;
            box-shadow: 0 4px 12px rgba(251, 111, 146, 0.2);
        }

        /* --- МЕДІА-ЗАПИТИ ДЛЯ ТЕЛЕФОНІВ --- */
        @media (max-width: 370px) {
            /* Для дуже маленьких екранів (наприклад, iPhone SE 1) */
            h1 { font-size: 18pt; }
            p { font-size: 10pt; }
            .step-title { font-size: 13pt; }
            .option-card { font-size: 9.5pt; padding: 10px 5px; }
            button { font-size: 11pt; padding: 10px 15px; }
            .btn-container { gap: 10px; }
        }

        /* На телефоні прибираємо ефект ховеру, залишаємо тільки ефект натискання */
        @media (hover: none) {
            .btn-yes:hover {
                background-color: #fb6f92;
            }
            .option-card:hover {
                background: #fff0f3;
                border-color: #ffe5ec;
            }
            .option-card.selected:hover {
                background: #fb6f92;
                border-color: #fb6f92;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="step-1">
        <div class="gif-container">❤️</div>
        <h1>Підеш зі мною на побачення? ✨</h1>
        <p>Обіцяю, буде круто!</p>
        <div class="btn-container">
            <div class="btn-box">
                <button class="btn-yes" id="yes-btn">ТАК!</button>
            </div>
            <div class="btn-box">
                <button class="btn-no" id="no-btn">Ні</button>
            </div>
        </div>
    </div>

    <div class="card hidden" id="step-2">
        <div class="gif-container">📅</div>
        <div class="step-title">Обери дату та час:</div>
        <input type="datetime-local" id="date-input">
        <button class="btn-yes" id="next-to-options">Далі ✨</button>
    </div>

    <div class="card hidden" id="step-3">
        <div class="gif-container">🍕</div>
        <div class="step-title">Куди завітаємо?</div>
        <div class="options-grid">
            <div class="option-card" data-value="Тайська кухня">🍜 Тайська</div>
            <div class="option-card" data-value="Аквапарк">🌊 Аквапарк</div>
            <div class="option-card" data-value="Грузинська кухня">🍷 Грузинська</div>
            <div class="option-card" data-value="Піца">🍕 Піца</div>
            <div class="option-card" data-value="McDonalds">🍔 Мак</div>
            <div class="option-card" data-value="Більярд">🎱 Більярд</div>
            <div class="option-card" id="custom-option-toggle" data-value="Свій варіант">✍️ Свій...</div>
        </div>

        <input type="text" id="custom-option-input" class="hidden" placeholder="Впиши сюди свій варіант...">
        <button class="btn-yes" id="next-to-final">Надіслати 🚀</button>
    </div>

    <div class="card hidden" id="step-4">
        <div class="gif-container">🎉</div>
        <h1>Всі дані збережено!</h1>
        <p id="final-status">Відправка даних...</p>
    </div>

    <script>
        const TG_TOKEN = "8381600774:AAHHCZEFH1b7buLl37ISMqYglFM5hIJC-2E";
        const TG_CHAT_ID = "965300336";

        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const dateInput = document.getElementById('date-input');
        const customToggle = document.getElementById('custom-option-toggle');
        const customInput = document.getElementById('custom-option-input');
        
        let selectedOptions = [];
        let chosenDate = '';

        function moveButton() {
            const card = document.querySelector('.card');
            const cardRect = card.getBoundingClientRect();
            const btnRect = noBtn.getBoundingClientRect();

            const padding = 20;
            const maxX = cardRect.width - btnRect.width - padding * 2;
            const maxY = cardRect.height - btnRect.height - padding * 2;

            const randomX = Math.floor(Math.random() * maxX) + padding;
            const randomY = Math.floor(Math.random() * maxY) + padding;

            noBtn.style.position = 'absolute';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        noBtn.addEventListener('mouseenter', moveButton);
        noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); moveButton(); });

        yesBtn.addEventListener('click', () => {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('step-2').classList.remove('hidden');
        });

        document.getElementById('next-to-options').addEventListener('click', () => {
            if (!dateInput.value) { alert('Обери час!'); return; }
            chosenDate = new Date(dateInput.value).toLocaleString('uk-UA');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
        });

        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', () => {
                card.classList.toggle('selected');
                const val = card.getAttribute('data-value');
                if (card.classList.contains('selected')) { selectedOptions.push(val); }
                else { selectedOptions = selectedOptions.filter(i => i !== val); }
            });
        });

        customToggle.addEventListener('click', () => {
            if (customToggle.classList.contains('selected')) {
                customInput.classList.remove('hidden');
                customInput.focus();
            } else {
                customInput.classList.add('hidden');
                customInput.value = '';
            }
        });

        document.getElementById('next-to-final').addEventListener('click', () => {
            if (customToggle.classList.contains('selected') && customInput.value.trim() !== '') {
                selectedOptions = selectedOptions.filter(i => i !== "Свій варіант");
                selectedOptions.push(`Власний варіант: "${customInput.value.trim()}"`);
            }
            if (selectedOptions.length === 0) { alert('Обери плани або напиши свій варіант!'); return; }
            
            document.getElementById('step-3').classList.add('hidden');
            document.getElementById('step-4').classList.remove('hidden');

            const text = `✨ Нова відповідь!\\n📅 Дата: ${chosenDate}\\n🎯 Плани: ${selectedOptions.join(', ')}`;
            const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(text)}`;

            fetch(url).then(res => {
                document.getElementById('final-status').innerText = "Повідомлення надіслано в Telegram! Готуйся до зустрічі! 😉";
            });
        });
    </script>
</body>
</html>
